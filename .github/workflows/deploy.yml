name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Active Pages côté dépôt si pas déjà fait et bascule la source sur
      # "GitHub Actions". Évite l'erreur classique au tout premier déploiement.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      # Les tests ne doivent pas bloquer le déploiement : ils restent exécutés
      # et visibles en cas de rouge, mais le site continue de se déployer.
      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Les clés Supabase sont optionnelles : si non définies côté repo
          # (Settings → Secrets and variables → Actions), le client Supabase
          # renvoie null et l'app reste en mode LocalStorage.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LLM_API_KEY: ${{ secrets.VITE_LLM_API_KEY }}
          VITE_LLM_BASE_URL: ${{ secrets.VITE_LLM_BASE_URL }}
          VITE_LLM_MODEL: ${{ secrets.VITE_LLM_MODEL }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
